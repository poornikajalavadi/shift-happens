

steps:
  - name: 'gcr.io/cloud-builders/gsutil'
    id: 'download-data'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'mkdir -p Data-Pipeline/data/processed && gsutil cp gs://shifthappens-data/application_train_merged.pkl Data-Pipeline/data/processed/'

  - name: 'python:3.10'
    id: 'test'
    entrypoint: 'bash'
    dir: 'Model-Development'
    args:
      - '-c'
      - 'pip install -r requirements.txt && mkdir -p logs models reports && pytest tests/ -v --tb=short'
    waitFor: ['download-data']

  - name: 'python:3.10'
    id: 'pipeline'
    entrypoint: 'bash'
    dir: 'Model-Development'
    env: ['GCS_BUCKET=${_GCS_BUCKET}']
    args:
      - '-c'
      - 'pip install -r requirements.txt && python3 scripts/preprocessor.py && python3 scripts/model_trainer.py && python3 scripts/hyperparameter_tuner.py && python3 scripts/model_validator.py && python3 scripts/bias_detector.py && python3 scripts/model_selection.py && python3 scripts/sensitivity_analysis.py && python3 scripts/registry_push.py'
    waitFor: ['test']

  - name: 'gcr.io/cloud-builders/gsutil'
    id: 'reports'
    args: ['-m', 'cp', '-r', 'Model-Development/reports/', 'gs://${_GCS_BUCKET}/build-reports/${BUILD_ID}/']
    waitFor: ['pipeline']

substitutions:
  _GCS_BUCKET: 'shifthappens-model-registry'
options:
  machineType: 'E2_HIGHCPU_8'
timeout: '3600s'