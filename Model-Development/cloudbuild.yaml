

steps:
  - name: 'gcr.io/cloud-builders/gsutil'
    id: 'data'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'mkdir -p Data-Pipeline/data/processed && gsutil cp gs://shifthappens-data/application_train_merged.pkl Data-Pipeline/data/processed/application_train_merged.pkl'
  - name: 'python:3.11'
    id: 'sample'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'pip install --no-cache-dir pandas && python3 -c "import pandas as pd; df=pd.read_pickle(\"Data-Pipeline/data/processed/application_train_merged.pkl\").sample(frac=0.05,random_state=42); df.to_pickle(\"Data-Pipeline/data/processed/application_train_merged.pkl\"); print(f\"Sampled to {len(df)} rows\")"'
    waitFor: ['data']
  - name: 'python:3.11'
    id: 'train'
    entrypoint: 'bash'
    dir: 'Model-Development'
    args:
      - '-c'
      - 'pip install --no-cache-dir -r requirements.txt && mkdir -p logs models reports && python3 scripts/preprocessor.py && python3 scripts/model_trainer.py'
    waitFor: ['sample']
  - name: 'python:3.11'
    id: 'validate'
    entrypoint: 'bash'
    dir: 'Model-Development'
    env: ['GCS_BUCKET=${_GCS_BUCKET}']
    args:
      - '-c'
      - 'pip install --no-cache-dir -r requirements.txt && python3 scripts/model_validator.py && python3 scripts/bias_detector.py && python3 scripts/model_selection.py'
    waitFor: ['train']
substitutions:
  _GCS_BUCKET: 'shifthappens-model-registry'
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
timeout: '3600s'